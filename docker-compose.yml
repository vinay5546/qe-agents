version: "3.8"

networks:
  qe-agents-net:
    driver: bridge

services:
  sut:
    build:
      context: .
      dockerfile: docker/Dockerfile.sut
    networks:
      - qe-agents-net
    ports:
      - "4000:4000"

  sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    networks:
      - qe-agents-net
    profiles: ["build-only"] # built ahead of time; run per-test via `docker run`, not compose up
